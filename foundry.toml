[build]
image = "louislam/uptime-kuma:1"
timeout = 1800

[triggers]
branches = ["main", "master"]
pull_requests = false

[deploy]
name = "uptime-kuma"
domain = "status.l3s.me"
port = 3001
compose_file = "compose.yaml"

[schedule]
cron = "0 1 * * 0"
branch = "master"
enabled = true
timezone = "UTC"

[env]
NODE_ENV = "production"
