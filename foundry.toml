[build]
image = "louislam/uptime-kuma:1"
timeout = 1800

[triggers]
branches = ["main", "master"]
pull_requests = false

[deploy]
name = "uptime-kuma"
domain = "status.l3s.me"
port = 3001

[schedule]
cron = "0 0 1 * * 1 *"
branch = "master"
enabled = true
timezone = "UTC"

[env]
NODE_ENV = "production"
